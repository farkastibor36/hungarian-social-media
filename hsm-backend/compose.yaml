services:
  mysql:
    image: 'mysql:latest'
    container_name: 'social-media-mysql'
    env_file:
      - '.env'
    restart: 'always'
    environment:
      - MYSQL_DATABASE=${MYSQL_DB}
      - MYSQL_ROOT_USER=root
      - MYSQL_ROOT_PASSWORD=root
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
volumes:
  mysql_data: